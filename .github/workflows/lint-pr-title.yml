# SECURITY: This workflow uses pull_request_target, which runs in the base
# branch context with access to repo secrets. This is safe ONLY because the
# workflow does not check out code from the PR. Never add an actions/checkout
# step to this workflow — doing so would allow fork PRs to execute arbitrary
# code with write permissions.
name: Lint PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize]
    branches: [dev]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: lint-pr-title
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per ADR-055 (third-party actions pinned to immutable commit SHA).
      # SHA = tag v6.1.1; bump the SHA and the comment together when upgrading.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            chore
            refactor
            test
            ci
            style
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The subject must start with a lowercase letter and not end with a period.
            Example: "feat(scope): add new feature"
