# Secret scanning via gitleaks (ADR-078).
#
# Per the psmfd org convention (no shared/reusable workflows exist; GitHub blocks
# public->private reusable-workflow calls), the scanner is INLINED here as a
# SHA-pinned public container image rather than a reusable workflow. It reads the
# repo's own .gitleaks.toml for allowlists. No secrets or elevated permissions are
# required. The job name `secrets-scan` is a required status check on protect-dev
# (ADR-079).
name: secrets-scan

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # ghcr.io/gitleaks/gitleaks:v8.30.1 (SHA-pinned, ADR-055)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --redact \
              --verbose \
              --exit-code=1
